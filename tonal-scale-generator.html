<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Tonal Scale Generator — Tailwind v4</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap");

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0e0e0d;
                --surface: #161614;
                --surface-2: #1e1e1b;
                --surface-3: #262622;
                --border: #2a2a26;
                --border-2: #343430;
                --text: #e8e8e3;
                --text-muted: #7a7a72;
                --text-faint: #44443e;
                --accent: #c4f135;
                --accent-dim: #8aaa25;
                --mono: "JetBrains Mono", "Fira Code", monospace;
                --sans: "DM Sans", system-ui, sans-serif;
            }

            body {
                font-family: var(--sans);
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                padding: 40px 28px 80px;
                max-width: 960px;
                margin: 0 auto;
                font-size: 13px;
                line-height: 1.5;
            }

            /* ── header ── */
            .header {
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                margin-bottom: 36px;
                padding-bottom: 20px;
                border-bottom: 1px solid var(--border);
            }
            .header-left h1 {
                font-size: 15px;
                font-weight: 500;
                letter-spacing: -0.01em;
                color: var(--text);
            }
            .header-left p {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text-faint);
                margin-top: 3px;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            /* ── buttons ── */
            button {
                font-family: var(--sans);
                font-size: 12px;
                font-weight: 500;
                cursor: pointer;
                border-radius: 6px;
                border: 1px solid var(--border-2);
                background: var(--surface-2);
                color: var(--text-muted);
                padding: 6px 12px;
                transition: all 0.1s;
                white-space: nowrap;
                letter-spacing: 0.01em;
            }
            button:hover {
                background: var(--surface-3);
                color: var(--text);
                border-color: var(--border-2);
            }
            button:active {
                transform: scale(0.97);
            }

            .btn-add {
                background: var(--accent);
                color: #0e0e0d;
                border-color: transparent;
                font-weight: 500;
            }
            .btn-add:hover {
                background: #d4ff50;
                color: #0e0e0d;
            }
            .btn-add:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }

            .btn-copy {
                font-family: var(--mono);
                font-size: 11px;
                padding: 5px 10px;
            }
            .btn-remove {
                padding: 4px 7px;
                font-size: 14px;
                line-height: 1;
                color: var(--text-faint);
            }
            .btn-remove:hover {
                color: #e05c5c;
                background: rgba(224, 92, 92, 0.1);
                border-color: rgba(224, 92, 92, 0.2);
            }

            /* ── inputs ── */
            input[type="text"] {
                font-family: var(--mono);
                font-size: 12px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 6px 10px;
                color: var(--text);
                outline: none;
                transition: border-color 0.15s;
                width: 100%;
            }
            input[type="text"]:focus {
                border-color: var(--accent-dim);
            }
            input[type="text"]::placeholder {
                color: var(--text-faint);
            }

            /* ── color row ── */
            .color-row {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 16px;
                margin-bottom: 10px;
                transition: border-color 0.15s;
            }
            .color-row:hover {
                border-color: var(--border-2);
            }

            .row-controls {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 14px;
            }

            .name-input {
                width: 140px !important;
                flex-shrink: 0;
            }

            .picker-wrap {
                width: 32px;
                height: 32px;
                border-radius: 6px;
                overflow: hidden;
                border: 1px solid var(--border-2);
                cursor: pointer;
                flex-shrink: 0;
                position: relative;
            }
            .picker-wrap input[type="color"] {
                position: absolute;
                inset: -6px;
                width: calc(100% + 12px);
                height: calc(100% + 12px);
                border: none;
                cursor: pointer;
                padding: 0;
            }

            .hex-input {
                width: 96px !important;
                flex-shrink: 0;
            }

            .hue-tag {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text-faint);
                padding: 4px 8px;
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: 5px;
                white-space: nowrap;
                margin-left: auto;
            }

            /* ── swatches ── */
            .swatches {
                display: grid;
                grid-template-columns: repeat(11, 1fr);
                gap: 3px;
            }

            .swatch-col {
                display: flex;
                flex-direction: column;
                gap: 4px;
                cursor: pointer;
                position: relative;
            }
            .swatch-col:hover .swatch {
                transform: scaleY(1.05);
            }
            .swatch-col:hover .swatch-hex {
                color: var(--text);
            }

            .swatch {
                height: 48px;
                border-radius: 5px;
                position: relative;
                transition: transform 0.12s ease;
                border: 1px solid rgba(255, 255, 255, 0.04);
            }

            .wcag-badge {
                position: absolute;
                bottom: 4px;
                right: 4px;
                font-family: var(--mono);
                font-size: 9px;
                font-weight: 500;
                padding: 1px 4px;
                border-radius: 3px;
                letter-spacing: 0.04em;
                pointer-events: none;
            }

            .swatch-shade {
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text-faint);
                text-align: center;
            }
            .swatch-hex {
                font-family: var(--mono);
                font-size: 9px;
                color: var(--text-faint);
                text-align: center;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                transition: color 0.1s;
            }

            /* ── tooltip ── */
            .tooltip {
                position: absolute;
                bottom: calc(100% + 6px);
                left: 50%;
                transform: translateX(-50%);
                background: var(--text);
                color: var(--bg);
                font-size: 10px;
                font-family: var(--mono);
                padding: 3px 7px;
                border-radius: 4px;
                white-space: nowrap;
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.12s;
                z-index: 10;
            }
            .swatch-col:hover .tooltip {
                opacity: 1;
            }

            /* ── legend ── */
            .legend {
                display: flex;
                gap: 14px;
                margin-bottom: 18px;
                flex-wrap: wrap;
            }
            .legend-item {
                display: flex;
                align-items: center;
                gap: 5px;
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text-faint);
            }
            .legend-dot {
                width: 14px;
                height: 14px;
                border-radius: 3px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 8px;
                font-weight: 700;
                letter-spacing: 0.03em;
            }

            /* ── code section ── */
            .code-section {
                margin-top: 24px;
                border: 1px solid var(--border);
                border-radius: 12px;
                overflow: hidden;
            }

            .code-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 14px;
                border-bottom: 1px solid var(--border);
                background: var(--surface);
            }
            .code-bar-left {
                display: flex;
                align-items: center;
                gap: 10px;
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text-muted);
            }
            .code-pill {
                font-family: var(--mono);
                font-size: 10px;
                background: var(--surface-3);
                border: 1px solid var(--border-2);
                border-radius: 4px;
                padding: 2px 7px;
                color: var(--text-faint);
            }

            pre {
                padding: 16px;
                font-family: var(--mono);
                font-size: 11.5px;
                line-height: 1.8;
                overflow: auto;
                max-height: 360px;
                background: var(--surface);
                margin: 0;
                color: var(--text);
                tab-size: 2;
            }

            /* syntax tokens */
            .t-at {
                color: #c4f135;
            }
            .t-key {
                color: #79c0ff;
            }
            .t-val {
                color: #a5d6a7;
            }
            .t-fn {
                color: #ffb380;
            }
            .t-num {
                color: #d2a8ff;
            }
            .t-cmt {
                color: var(--text-faint);
                font-style: italic;
            }
            .t-semi {
                color: var(--text-faint);
            }

            /* ── chroma curve viz ── */
            .curve-row {
                margin-top: 16px;
                padding-top: 14px;
                border-top: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .curve-label {
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text-faint);
                white-space: nowrap;
            }
            .curve-bars {
                display: flex;
                align-items: flex-end;
                gap: 2px;
                height: 24px;
                flex: 1;
            }
            .curve-bar {
                flex: 1;
                border-radius: 2px 2px 0 0;
                opacity: 0.75;
                transition: opacity 0.15s;
            }
            .curve-bar:hover {
                opacity: 1;
            }

            /* ── empty state ── */
            .empty-state {
                text-align: center;
                padding: 60px 20px;
                color: var(--text-faint);
                font-family: var(--mono);
                font-size: 12px;
                border: 1px dashed var(--border);
                border-radius: 12px;
                margin-bottom: 10px;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <div class="header-left">
                <h1>Tonal Scale Generator</h1>
                <p>OKLCH · parabolic chroma · Tailwind v4 @theme</p>
            </div>
            <div class="header-right">
                <div class="legend">
                    <div class="legend-item">
                        <div
                            class="legend-dot"
                            style="
                                background: rgba(255, 255, 255, 0.15);
                                color: rgba(255, 255, 255, 0.7);
                            "
                        >
                            AA
                        </div>
                        <span>passes AA on dark</span>
                    </div>
                    <div class="legend-item">
                        <div
                            class="legend-dot"
                            style="
                                background: rgba(0, 0, 0, 0.12);
                                color: rgba(0, 0, 0, 0.55);
                            "
                        >
                            AA
                        </div>
                        <span>passes AA on white</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="rows"></div>

        <div
            style="
                display: flex;
                gap: 8px;
                margin-bottom: 24px;
                align-items: center;
            "
        >
            <button class="btn-add" id="add-btn" onclick="addColor()">
                + Add color
            </button>
            <span
                id="limit-hint"
                style="
                    font-size: 11px;
                    color: var(--text-faint);
                    font-family: var(--mono);
                "
            ></span>
        </div>

        <div class="code-section">
            <div class="code-bar">
                <div class="code-bar-left">
                    Generated CSS
                    <span class="code-pill">@theme</span>
                    <span class="code-pill">oklch</span>
                </div>
                <button class="btn-copy" id="copy-btn" onclick="copyCode()">
                    copy
                </button>
            </div>
            <pre id="code-out"></pre>
        </div>

        <script>
            // ─── OKLCH math ───────────────────────────────────────────────────

            function hexToOklch(hex) {
                hex = hex.replace("#", "");
                if (hex.length === 3)
                    hex = hex
                        .split("")
                        .map((c) => c + c)
                        .join("");
                const r = parseInt(hex.slice(0, 2), 16) / 255;
                const g = parseInt(hex.slice(2, 4), 16) / 255;
                const b = parseInt(hex.slice(4, 6), 16) / 255;

                const lin = (c) =>
                    c > 0.04045
                        ? Math.pow((c + 0.055) / 1.055, 2.4)
                        : c / 12.92;
                const rl = lin(r),
                    gl = lin(g),
                    bl = lin(b);

                const lm =
                    0.4122214708 * rl + 0.5363325363 * gl + 0.0514459929 * bl;
                const mm =
                    0.2119034982 * rl + 0.6806995451 * gl + 0.1073969566 * bl;
                const sm =
                    0.0883024619 * rl + 0.2817188376 * gl + 0.6299787005 * bl;

                const l_ = Math.cbrt(lm),
                    m_ = Math.cbrt(mm),
                    s_ = Math.cbrt(sm);

                const L =
                    0.2104542553 * l_ + 0.793617785 * m_ - 0.0040720468 * s_;
                const a =
                    1.9779984951 * l_ - 2.428592205 * m_ + 0.4505937099 * s_;
                const b2 =
                    0.0259040371 * l_ + 0.7827717662 * m_ - 0.808675766 * s_;

                const C = Math.sqrt(a * a + b2 * b2);
                const H = ((Math.atan2(b2, a) * 180) / Math.PI + 360) % 360;
                return { L, C, H };
            }

            function oklchToHex(L, C, H) {
                const hr = (H * Math.PI) / 180;
                const a = C * Math.cos(hr),
                    b = C * Math.sin(hr);

                const l_ = L + 0.3963377774 * a + 0.2158037573 * b;
                const m_ = L - 0.1055613458 * a - 0.0638541728 * b;
                const s_ = L - 0.0894841775 * a - 1.291485548 * b;

                const l3 = l_ ** 3,
                    m3 = m_ ** 3,
                    s3 = s_ ** 3;

                const gam = (c) => {
                    c = Math.max(0, Math.min(1, c));
                    return c > 0.0031308
                        ? 1.055 * Math.pow(c, 1 / 2.4) - 0.055
                        : 12.92 * c;
                };

                const R = Math.round(
                    gam(
                        4.0767416621 * l3 -
                            3.3077115913 * m3 +
                            0.2309699292 * s3,
                    ) * 255,
                );
                const G = Math.round(
                    gam(
                        -1.2684380046 * l3 +
                            2.6097574011 * m3 -
                            0.3413193965 * s3,
                    ) * 255,
                );
                const B = Math.round(
                    gam(
                        -0.0041960863 * l3 -
                            0.7034186147 * m3 +
                            1.707614701 * s3,
                    ) * 255,
                );
                return (
                    "#" +
                    [R, G, B]
                        .map((v) =>
                            Math.max(0, Math.min(255, v))
                                .toString(16)
                                .padStart(2, "0"),
                        )
                        .join("")
                );
            }

            function hexLuminance(hex) {
                hex = hex.replace("#", "");
                const lin = (c) => {
                    c /= 255;
                    return c > 0.04045
                        ? ((c + 0.055) / 1.055) ** 2.4
                        : c / 12.92;
                };
                return (
                    0.2126 * lin(parseInt(hex.slice(0, 2), 16)) +
                    0.7152 * lin(parseInt(hex.slice(2, 4), 16)) +
                    0.0722 * lin(parseInt(hex.slice(4, 6), 16))
                );
            }

            function contrastRatio(h1, h2) {
                const l1 = hexLuminance(h1),
                    l2 = hexLuminance(h2);
                const hi = Math.max(l1, l2),
                    lo = Math.min(l1, l2);
                return (hi + 0.05) / (lo + 0.05);
            }

            // ─── scale params ─────────────────────────────────────────────────
            // Parabolic chroma curve: peaks at 500, tapers toward 50 and 950.
            // This prevents gamut clipping at extremes and keeps light tints
            // from going muddy, and dark shades from looking grayish.

            const SHADES = [
                50, 100, 200, 300, 400, 500, 600, 700, 800, 900, 950,
            ];
            const L_STOPS = [
                0.977, 0.94, 0.89, 0.82, 0.74, 0.64, 0.53, 0.43, 0.33, 0.23,
                0.16,
            ];
            // Parabolic — NOT linear. Peak at index 5 (500).
            const C_MULT = [
                0.05, 0.12, 0.28, 0.52, 0.78, 1.0, 0.92, 0.82, 0.68, 0.5, 0.32,
            ];
            const MAX_C = 0.37; // sRGB gamut ceiling for OKLCH chroma

            function generateScale(baseHex) {
                const { C, H } = hexToOklch(baseHex);
                return SHADES.map((shade, i) => {
                    const Cv = Math.min(C * C_MULT[i], MAX_C);
                    const hex = oklchToHex(L_STOPS[i], Cv, H);
                    return {
                        shade,
                        hex,
                        L: L_STOPS[i].toFixed(3),
                        C: Cv.toFixed(4),
                        H: H.toFixed(1),
                        cMult: C_MULT[i],
                    };
                });
            }

            // ─── state ────────────────────────────────────────────────────────
            const PRESET_COLORS = [
                "#3B5BDB",
                "#E03131",
                "#2F9E44",
                "#F08C00",
                "#7048E8",
                "#0C8599",
            ];

            let colors = [{ id: 1, name: "primary", hex: "#3B5BDB" }];
            let nextId = 2;

            // ─── render ───────────────────────────────────────────────────────
            function render() {
                const container = document.getElementById("rows");
                container.innerHTML = "";

                if (colors.length === 0) {
                    const empty = document.createElement("div");
                    empty.className = "empty-state";
                    empty.textContent = "// no colors yet — add one above";
                    container.appendChild(empty);
                } else {
                    colors.forEach((col) =>
                        container.appendChild(buildRow(col)),
                    );
                }

                document.getElementById("add-btn").disabled =
                    colors.length >= 6;
                document.getElementById("limit-hint").textContent =
                    colors.length >= 6 ? "// max 6 colors" : "";
                document.getElementById("code-out").innerHTML = buildCode();
            }

            function buildRow(col) {
                const scale = generateScale(col.hex);
                const { H, C } = hexToOklch(col.hex);

                const wrap = document.createElement("div");
                wrap.className = "color-row";

                // ── controls ──
                const ctrl = document.createElement("div");
                ctrl.className = "row-controls";

                const ni = document.createElement("input");
                ni.type = "text";
                ni.className = "name-input";
                ni.value = col.name;
                ni.placeholder = "color-name";
                ni.spellcheck = false;
                ni.maxLength = 32;
                ni.addEventListener("input", (e) => {
                    const c = colors.find((c) => c.id === col.id);
                    if (c) {
                        c.name = e.target.value.replace(/\s+/g, "-") || "color";
                    }
                    document.getElementById("code-out").innerHTML = buildCode();
                });

                const cpw = document.createElement("div");
                cpw.className = "picker-wrap";
                cpw.style.background = col.hex;
                const cp = document.createElement("input");
                cp.type = "color";
                cp.value = col.hex;
                cp.addEventListener("input", (e) =>
                    applyColor(col.id, e.target.value, wrap),
                );
                cpw.appendChild(cp);

                const hi = document.createElement("input");
                hi.type = "text";
                hi.className = "hex-input";
                hi.value = col.hex.toUpperCase();
                hi.maxLength = 7;
                hi.spellcheck = false;
                hi.addEventListener("input", (e) => {
                    const v = e.target.value.trim();
                    if (/^#[0-9a-fA-F]{6}$/.test(v))
                        applyColor(col.id, v, wrap);
                });
                hi.addEventListener("blur", (e) => {
                    const c = colors.find((c) => c.id === col.id);
                    if (c) e.target.value = c.hex.toUpperCase();
                });

                const tag = document.createElement("span");
                tag.className = "hue-tag";
                tag.id = `tag-${col.id}`;
                tag.textContent = `H ${Math.round(H)}° C ${(C * 100).toFixed(0)}%`;

                ctrl.append(ni, cpw, hi, tag);

                if (colors.length > 1) {
                    const rb = document.createElement("button");
                    rb.className = "btn-remove";
                    rb.textContent = "×";
                    rb.title = "Remove";
                    rb.addEventListener("click", () => {
                        colors = colors.filter((c) => c.id !== col.id);
                        render();
                    });
                    ctrl.appendChild(rb);
                }

                // ── swatches ──
                const swRow = document.createElement("div");
                swRow.className = "swatches";

                scale.forEach((s) => {
                    const col_wrap = document.createElement("div");
                    col_wrap.className = "swatch-col";

                    const chip = document.createElement("div");
                    chip.className = "swatch";
                    chip.style.background = s.hex;

                    // WCAG badges — show if this shade passes 4.5:1 (AA) with white or dark text
                    const onWhite = contrastRatio(s.hex, "#ffffff");
                    const onDark = contrastRatio(s.hex, "#111110");

                    if (onDark >= 4.5) {
                        const badge = document.createElement("span");
                        badge.className = "wcag-badge";
                        badge.style.background = "rgba(255,255,255,0.18)";
                        badge.style.color = "rgba(255,255,255,0.75)";
                        badge.textContent = onDark >= 7 ? "AAA" : "AA";
                        chip.appendChild(badge);
                    } else if (onWhite >= 4.5) {
                        const badge = document.createElement("span");
                        badge.className = "wcag-badge";
                        badge.style.background = "rgba(0,0,0,0.12)";
                        badge.style.color = "rgba(0,0,0,0.5)";
                        badge.textContent = onWhite >= 7 ? "AAA" : "AA";
                        chip.appendChild(badge);
                    }

                    // Tooltip: oklch values on hover
                    const tt = document.createElement("div");
                    tt.className = "tooltip";
                    tt.textContent = `${s.hex.toUpperCase()}  oklch(${s.L} ${s.C} ${s.H})`;
                    chip.appendChild(tt);

                    // Click to copy hex
                    col_wrap.style.cursor = "pointer";
                    col_wrap.title = `Click to copy ${s.hex.toUpperCase()}`;
                    col_wrap.addEventListener("click", () => {
                        navigator.clipboard
                            .writeText(s.hex.toUpperCase())
                            .catch(() => {});
                        tt.textContent = "copied!";
                        setTimeout(() => {
                            tt.textContent = `${s.hex.toUpperCase()}  oklch(${s.L} ${s.C} ${s.H})`;
                        }, 1200);
                    });

                    const shade_lbl = document.createElement("div");
                    shade_lbl.className = "swatch-shade";
                    shade_lbl.textContent = s.shade;

                    const hex_lbl = document.createElement("div");
                    hex_lbl.className = "swatch-hex";
                    hex_lbl.textContent = s.hex.toUpperCase().slice(1);

                    col_wrap.append(chip, shade_lbl, hex_lbl);
                    swRow.appendChild(col_wrap);
                });

                // ── chroma curve ──
                const curve = document.createElement("div");
                curve.className = "curve-row";
                const cl = document.createElement("span");
                cl.className = "curve-label";
                cl.textContent = "chroma curve";
                const bars = document.createElement("div");
                bars.className = "curve-bars";
                C_MULT.forEach((m, i) => {
                    const bar = document.createElement("div");
                    bar.className = "curve-bar";
                    bar.style.height = `${Math.round(m * 100)}%`;
                    bar.style.background = scale[i].hex;
                    bar.title = `${SHADES[i]}: ${Math.round(m * 100)}% chroma`;
                    bars.appendChild(bar);
                });
                const cl2 = document.createElement("span");
                cl2.className = "curve-label";
                const { C: baseC } = hexToOklch(col.hex);
                cl2.textContent = `peak C ${(Math.min(baseC, MAX_C) * 100).toFixed(1)}%`;
                curve.append(cl, bars, cl2);

                wrap.append(ctrl, swRow, curve);
                return wrap;
            }

            function applyColor(id, hex, rowEl) {
                const col = colors.find((c) => c.id === id);
                if (!col) return;
                col.hex = hex;
                const newRow = buildRow(col);
                rowEl.replaceWith(newRow);
                document.getElementById("code-out").innerHTML = buildCode();
            }

            // ─── code generation ──────────────────────────────────────────────
            function buildCode() {
                const esc = (s) =>
                    s.replace(/&/g, "&amp;").replace(/</g, "&lt;");
                const key = (s) => `<span class="t-key">${esc(s)}</span>`;
                const val = (s) => `<span class="t-val">${esc(s)}</span>`;
                const fn = (s) => `<span class="t-fn">${esc(s)}</span>`;
                const num = (s) => `<span class="t-num">${esc(s)}</span>`;
                const cmt = (s) => `<span class="t-cmt">${esc(s)}</span>`;
                const at = (s) => `<span class="t-at">${esc(s)}</span>`;
                const semi = `<span class="t-semi">;</span>`;

                const lines = [];
                lines.push(
                    `${at("@import")} ${val('"tailwindcss"')}${semi}`,
                    "",
                );
                lines.push(`${at("@theme")} {`);

                colors.forEach((col) => {
                    const scale = generateScale(col.hex);
                    const name = col.name || "primary";
                    lines.push(
                        `  ${cmt(`/* ${name} — hue ${hexToOklch(col.hex).H.toFixed(1)}° */`)}`,
                    );
                    scale.forEach((s) => {
                        lines.push(
                            `  ${key(`--color-${name}-${s.shade}`)}: ${fn("oklch")}(${num(s.L)} ${num(s.C)} ${num(s.H)})${semi}`,
                        );
                    });
                    lines.push("");
                });

                // Hue-tinted neutral (low chroma, matches first color's hue)
                const { H: h0 } = hexToOklch(colors[0].hex);
                lines.push(
                    `  ${cmt(`/* neutral — hue-matched to ${colors[0].name || "primary"} */`)}`,
                );
                SHADES.forEach((shade, i) => {
                    lines.push(
                        `  ${key(`--color-neutral-${shade}`)}: ${fn("oklch")}(${num(L_STOPS[i].toFixed(3))} ${num("0.006")} ${num(Math.round(h0).toString())})${semi}`,
                    );
                });
                lines.push("");

                // Semantic tokens
                const p = colors[0].name || "primary";
                lines.push(`  ${cmt("/* semantic tokens */")}`);
                const semantics = [
                    ["--color-bg", "var(--color-neutral-50)"],
                    ["--color-surface", "var(--color-neutral-100)"],
                    ["--color-surface-raised", "var(--color-neutral-200)"],
                    ["--color-overlay", "var(--color-neutral-50)"],
                    ["--color-text", "var(--color-neutral-900)"],
                    ["--color-text-muted", "var(--color-neutral-500)"],
                    ["--color-text-faint", "var(--color-neutral-300)"],
                    ["--color-border", "var(--color-neutral-200)"],
                    ["--color-border-subtle", "var(--color-neutral-100)"],
                    ["--color-brand", `var(--color-${p}-500)`],
                    ["--color-brand-hover", `var(--color-${p}-600)`],
                    ["--color-brand-subtle", `var(--color-${p}-100)`],
                    ["--color-brand-text", `var(--color-${p}-700)`],
                ];
                semantics.forEach(([k, v]) =>
                    lines.push(`  ${key(k)}: ${val(v)}${semi}`),
                );
                lines.push("");

                // Dark mode override
                lines.push(
                    `  ${cmt("/* dark mode — remap semantics, raw scales stay the same */")}`,
                );
                lines.push("}", "");
                lines.push(`${at("@media")} (prefers-color-scheme: dark) {`);
                lines.push(`  ${at("@theme")} {`);
                const dark = [
                    ["--color-bg", "var(--color-neutral-950)"],
                    ["--color-surface", "var(--color-neutral-900)"],
                    ["--color-surface-raised", "var(--color-neutral-800)"],
                    ["--color-overlay", "var(--color-neutral-900)"],
                    ["--color-text", "var(--color-neutral-50)"],
                    ["--color-text-muted", "var(--color-neutral-400)"],
                    ["--color-text-faint", "var(--color-neutral-600)"],
                    ["--color-border", "var(--color-neutral-800)"],
                    ["--color-border-subtle", "var(--color-neutral-900)"],
                    ["--color-brand", `var(--color-${p}-400)`],
                    ["--color-brand-hover", `var(--color-${p}-300)`],
                    ["--color-brand-subtle", `var(--color-${p}-900)`],
                    ["--color-brand-text", `var(--color-${p}-200)`],
                ];
                dark.forEach(([k, v]) =>
                    lines.push(`    ${key(k)}: ${val(v)}${semi}`),
                );
                lines.push("  }", "}");

                return lines.join("\n");
            }

            function copyCode() {
                const raw = document.getElementById("code-out").textContent;
                navigator.clipboard
                    .writeText(raw)
                    .then(() => {
                        const btn = document.getElementById("copy-btn");
                        btn.textContent = "copied!";
                        setTimeout(() => (btn.textContent = "copy"), 1800);
                    })
                    .catch(() => {});
            }

            function addColor() {
                if (colors.length >= 6) return;
                colors.push({
                    id: nextId++,
                    name: `color-${colors.length + 1}`,
                    hex: PRESET_COLORS[colors.length] || "#888888",
                });
                render();
            }

            // init
            render();
        </script>
    </body>
</html>
